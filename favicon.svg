<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background square with border -->
  <rect x="2" y="2" width="60" height="60" fill="#ffffff" stroke="#1a1a1a" stroke-width="4"/>

  <!-- T letter -->
  <text x="14" y="44" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="bold" fill="#1a1a1a">T</text>

  <!-- S letter -->
  <text x="32" y="44" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="bold" fill="#1a1a1a">S</text>

  <!-- Plus sign accent in upper right -->
  <g transform="translate(54, 12)">
    <line x1="0" y1="-5" x2="0" y2="5" stroke="#1a1a1a" stroke-width="3"/>
    <line x1="-5" y1="0" x2="5" y2="0" stroke="#1a1a1a" stroke-width="3"/>
  </g>
</svg>
